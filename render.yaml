# Render Blueprint — SourceWatch Backend
# Deploy: `render blueprint apply render.yaml`
#
# NOTE: render.yaml sets env vars via blueprint ONLY when using
# `render blueprint apply`. For GitHub-auto-deploy, set these
# environment variables MANUALLY in Render dashboard:
#   DATA_DIR = /app/data
#   CHROMADB_PATH = /app/data/chromadb

services:
  - type: web
    name: sourcewatch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    region: singapore
    branch: main
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: DATA_DIR
        value: /app/data
      - key: CHROMADB_PATH
        value: /app/data/chromadb
      - key: SCRAPE_DELAY
        value: "1.0"
      - key: PYTHONPATH
        value: /app