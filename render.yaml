# Render Blueprint — SourceWatch Backend
# Deploy: `render blueprint apply render.yaml`
#
# NOTE: PostgreSQL database (sourcewatchdb) should be linked via Render dashboard.
# Render auto-sets DATABASE_URL when a database is linked. No disk mount needed.

services:
  - type: web
    name: sourcewatch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    region: singapore
    branch: main
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: SCRAPE_DELAY
        value: "1.0"
      - key: PYTHONPATH
        value: /app
      - key: DATABASE_PATH
        value: ./data/sourcewatch.db
      - key: CHROMADB_PATH
        value: ./data/chromadb
