# Render Blueprint — SourceWatch Backend
# Deploy: `render blueprint apply render.yaml`

services:
  - type: web
    name: sourcewatch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    region: singapore
    branch: main
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /data/sourcewatch.db
      - key: CHROMADB_PATH
        value: /data/chromadb
      - key: SCRAPE_DELAY
        value: "1.0"
      - key: PYTHONPATH
        value: /app
    disk:
      name: sourcewatch-data
      mountPath: /data
      sizeGB: 1